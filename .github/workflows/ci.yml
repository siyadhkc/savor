name: CI — Savor Quality Gate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────
  #  Backend: Django Migrations + Tests
  # ──────────────────────────────────────
  backend:
    name: 🐍 Django Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: savor_test_db
          POSTGRES_USER: savor_user
          POSTGRES_PASSWORD: savor_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      # Django core
      SECRET_KEY: ci-only-insecure-key-not-used-in-production
      DEBUG: "True"

      # CI test database — matches the postgres service above
      DB_NAME: savor_test_db
      DB_USER: savor_user
      DB_PASSWORD: savor_password
      DB_HOST: localhost
      DB_PORT: "5432"

      # Third-party keys — dummy values are fine for CI
      # (tests don't actually call Cloudinary, Razorpay, or Gmail)
      CLOUDINARY_CLOUD_NAME: ci-dummy
      CLOUDINARY_API_KEY: "000000000000000"
      CLOUDINARY_API_SECRET: ci-dummy-secret
      RAZORPAY_KEY_ID: rzp_test_ci_dummy
      RAZORPAY_KEY_SECRET: ci_dummy_secret
      EMAIL_HOST_USER: ci@example.com
      EMAIL_HOST_PASSWORD: ci-dummy-password

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run migrations
        working-directory: backend
        run: python manage.py migrate

      - name: Run Django tests
        working-directory: backend
        run: python manage.py test --verbosity=2

  # ──────────────────────────────────────
  #  Frontend: ESLint + Build Check
  # ──────────────────────────────────────
  frontend:
    name: ⚡ React Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ESLint
        working-directory: frontend
        run: npm run lint

      - name: Build production bundle
        working-directory: frontend
        env:
          VITE_API_URL: https://food-delivery-backend-c4pe.onrender.com/api
          VITE_RAZORPAY_KEY_ID: rzp_test_ci_dummy
        run: npm run build
